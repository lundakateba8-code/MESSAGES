<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Photo Message Audio</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <h2 id="authTitle">🔐 Connexion</h2>
            <p id="authSubtitle">Connectez-vous à votre compte</p>
        </div>
        <div id="alertContainer" class="alert alert-error"></div>

        <!-- Formulaire connexion -->
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Se connecter</button>
        </form>

        <!-- Formulaire inscription -->
        <form id="registerForm" style="display:none">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" id="registerUsername" placeholder="JohnDoe" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="registerPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">S'inscrire</button>
        </form>

        <div class="auth-toggle">
            <span id="toggleText">Pas encore de compte ?</span>
            <a id="toggleLink" onclick="toggleForm()">S'inscrire</a>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/helpers.js"></script>
    <script>
        let isLogin = true;
        const API_URL = CONFIG.API_URL;

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('authTitle').textContent = isLogin ? '🔐 Connexion' : '📝 Inscription';
            document.getElementById('authSubtitle').textContent = isLogin ? 'Connectez-vous à votre compte' : 'Créez un nouveau compte';
            document.getElementById('toggleText').textContent = isLogin ? 'Pas encore de compte ?' : 'Déjà un compte ?';
            document.getElementById('toggleLink').textContent = isLogin ? 'S\'inscrire' : 'Se connecter';
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alertContainer');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (data.success) {
                    Auth.setToken(data.token);
                    Auth.setUser(data.user);
                    window.location.href = 'profile.html';
                } else {
                    showAlert(data.message);
                }
            } catch (error) {
                showAlert('Erreur de connexion');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    Auth.setToken(data.token);
                    Auth.setUser(data.user);
                    window.location.href = 'profile.html';
                } else {
                    showAlert(data.message);
                }
            } catch (error) {
                showAlert('Erreur d\'inscription');
            }
        });
    </script>
</body>
</html>
